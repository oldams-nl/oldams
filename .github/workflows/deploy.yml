name: deploy

# Build the Next.js static export and publish it to S3 + CloudFront. Auth is via
# GitHub OIDC assuming the least-privilege oldams-deploy role (no stored keys).
# The build is self-contained: prebuild regenerates public/data from the
# committed data/*.ndjson, so no seeds.rb (and no Ruby) is needed here.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "data/**"
      - "scripts/**"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # prebuild (scripts/build-data.mjs) runs automatically, then next build.
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        env:
          BUCKET: ${{ vars.SITE_BUCKET }}
        run: |
          # Content-hashed assets: cache forever.
          aws s3 sync out/_next/static "s3://$BUCKET/_next/static" \
            --cache-control "public,max-age=31536000,immutable" --only-show-errors
          # Everything else (HTML + /data JSON): short cache, prune removed files.
          aws s3 sync out "s3://$BUCKET" --delete \
            --exclude "_next/static/*" \
            --cache-control "public,max-age=300,must-revalidate" --only-show-errors

      - name: Invalidate CloudFront
        env:
          DIST: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DIST" --paths "/*" >/dev/null
          echo "invalidated $DIST"
